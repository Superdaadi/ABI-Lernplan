<div class="md-viewer">

  <!-- ── Drop zone (shown when no content is rendered yet) ── -->
  <div *ngIf="!renderedHtml && !loading" class="drop-zone" (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
      </svg>
    </div>
    <p class="drop-label">Markdown-Datei hier ablegen</p>
    <p class="drop-sub">oder</p>
    <label class="file-btn">
      Datei auswählen
      <input type="file" accept=".md,text/markdown" (change)="onFileSelected($event)" hidden />
    </label>
  </div>

  <!-- ── Loading ── -->
  <div *ngIf="loading" class="state-msg">
    <span class="spinner"></span>
    Wird geladen…
  </div>

  <!-- ── Error ── -->
  <div *ngIf="error" class="error-msg">{{ error }}</div>

  <!-- ── Rendered markdown ── -->
  <article *ngIf="renderedHtml && !loading" class="md-body" [innerHTML]="renderedHtml"></article>

  <!-- ── Reload button ── -->
  <!--button
    *ngIf="renderedHtml && !loading"
    class="reload-btn"
    (click)="renderedHtml = ''"
    title="Andere Datei laden"
  >
    ↩ Andere Datei
  </button>
  -->

</div>
